<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inventario</title>
<meta name="theme-color" content="#1F4E79">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inventario">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E7EEF4;
    --surface:#FFFFFF;
    --ink:#1B2A38;
    --ink-soft:#5A6B7C;
    --ink-faint:#93A3B1;
    --line:#C7D5E0;
    --line-soft:#DBE5ED;
    --accent:#1F4E79;
    --accent-ink:#EAF1F8;
    --accent-soft:#D6E3EE;
    --danger:#A6432E;
    --danger-soft:#F2E1DB;
    --radius:10px;
    --shadow:0 1px 2px rgba(38,36,32,0.06), 0 4px 14px rgba(38,36,32,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{
    max-width:640px;
    margin:0 auto;
    padding:0 16px 120px;
  }
  header{
    padding:28px 4px 16px;
    position:sticky;
    top:0;
    background:var(--paper);
    z-index:10;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:14px;
  }
  h1{
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.02em;
    margin:0;
    text-transform:uppercase;
  }
  .count-badge{
    font-family:'Space Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:20px;
    padding:3px 10px;
  }
  .search{
    width:100%;
    border:1px solid var(--line);
    background:var(--surface);
    border-radius:var(--radius);
    padding:10px 12px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    margin-bottom:12px;
  }
  .search::placeholder{color:var(--ink-faint);}
  .search:focus{outline:none;border-color:var(--accent);}
  .toggle-group{
    display:flex;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:3px;
    gap:3px;
  }
  .toggle-btn{
    flex:1;
    border:none;
    background:transparent;
    padding:8px 10px;
    border-radius:7px;
    font-family:'Space Mono',monospace;
    font-size:12px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .toggle-btn.active{
    background:var(--accent);
    color:var(--accent-ink);
  }
  main{padding-top:6px;}
  .cat-header{
    display:flex;
    align-items:center;
    gap:8px;
    margin:22px 0 8px;
    padding:0 2px;
  }
  .cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .cat-header h2{
    font-family:'Space Mono',monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
    margin:0;
    font-weight:700;
  }
  .cat-header .cat-count{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--ink-faint);
    margin-left:auto;
  }
  .product-card{
    display:flex;
    align-items:center;
    background:var(--surface);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    margin-bottom:8px;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .cat-tab{
    width:6px;
    align-self:stretch;
    flex-shrink:0;
  }
  .product-main{
    flex:1;
    min-width:0;
    padding:12px 10px 12px 12px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .product-name{
    flex:1;
    min-width:0;
    font-size:14.5px;
    font-weight:500;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .product-name .p-cat{
    display:block;
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    font-weight:400;
    color:var(--ink-faint);
    text-transform:uppercase;
    letter-spacing:0.03em;
    margin-top:1px;
  }
  .stepper{
    display:flex;
    align-items:center;
    gap:2px;
    flex-shrink:0;
  }
  .step-btn{
    width:26px;
    height:26px;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:6px;
    font-size:14px;
    color:var(--ink);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1;
  }
  .step-btn:active{transform:scale(0.94);}
  .qty{
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:14px;
    min-width:26px;
    text-align:center;
  }
  .del-btn{
    width:36px;
    align-self:stretch;
    border:none;
    background:transparent;
    color:var(--ink-faint);
    font-size:16px;
    cursor:pointer;
    flex-shrink:0;
    border-left:1px solid var(--line-soft);
  }
  .del-btn:hover{color:var(--danger);background:var(--danger-soft);}
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
  }
  .empty-state .big{
    font-family:'Space Mono',monospace;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin-bottom:6px;
  }
  .empty-state .small{font-size:13px;color:var(--ink-faint);}
  .fab{
    position:fixed;
    bottom:24px;
    right:24px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:var(--accent);
    color:var(--accent-ink);
    border:none;
    font-size:26px;
    font-weight:400;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(31,78,121,0.4);
    z-index:30;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .fab:active{transform:scale(0.95);}
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(38,36,32,0.45);
    z-index:40;
    display:none;
    align-items:flex-end;
    justify-content:center;
  }
  .overlay.show{display:flex;}
  .overlay.center{align-items:center;padding:20px;}
  .sheet{
    background:var(--paper);
    width:100%;
    max-width:640px;
    border-radius:18px 18px 0 0;
    padding:10px 16px 28px;
  }
  .sheet-handle{
    width:36px;
    height:4px;
    background:var(--line);
    border-radius:2px;
    margin:6px auto 16px;
  }
  .sheet-option{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    text-align:left;
    background:var(--surface);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    padding:14px 14px;
    margin-bottom:8px;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    font-weight:500;
    color:var(--ink);
    cursor:pointer;
  }
  .sheet-option .icon{
    width:30px;
    height:30px;
    border-radius:50%;
    background:var(--accent-soft);
    color:var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Space Mono',monospace;
    font-size:14px;
    font-weight:700;
    flex-shrink:0;
  }
  .dialog{
    background:var(--surface);
    width:100%;
    max-width:420px;
    border-radius:14px;
    padding:20px;
  }
  .dialog h3{
    font-family:'Space Mono',monospace;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.03em;
    margin:0 0 16px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:5px;
    font-weight:500;
  }
  .field input, .field select, .field textarea{
    width:100%;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    padding:9px 10px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    color:var(--ink);
  }
  .field textarea{
    font-family:'Space Mono',monospace;
    font-size:13px;
    min-height:110px;
    resize:vertical;
    line-height:1.5;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--accent);}
  .field-hint{font-size:11.5px;color:var(--ink-faint);margin-top:4px;}
  .dialog-actions{
    display:flex;
    gap:8px;
    margin-top:6px;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:8px;
    padding:11px 14px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .btn-primary{background:var(--accent);color:var(--accent-ink);}
  .btn-secondary{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:var(--paper);
    padding:10px 18px;
    border-radius:20px;
    font-size:13px;
    z-index:50;
    opacity:0;
    transition:opacity 0.25s, transform 0.25s;
    pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .loading{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-faint);
    font-family:'Space Mono',monospace;
    font-size:13px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title-row">
      <h1>Inventario</h1>
      <span class="count-badge" id="countBadge">0 prodotti</span>
    </div>
    <input class="search" id="searchInput" placeholder="Cerca un prodotto...">
    <div class="toggle-group">
      <button class="toggle-btn active" id="btnAlpha">A → Z</button>
      <button class="toggle-btn" id="btnCat">Categorie</button>
    </div>
  </header>
  <main id="mainList">
    <div class="loading">Caricamento inventario...</div>
  </main>
</div>

<button class="fab" id="fabBtn" aria-label="Aggiungi">+</button>

<div class="overlay" id="menuOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-option" id="optCategory"><span class="icon">C</span>Nuova categoria</button>
    <button class="sheet-option" id="optProduct"><span class="icon">P</span>Nuovo prodotto</button>
    <button class="sheet-option" id="optImport"><span class="icon">L</span>Importa lista della spesa</button>
  </div>
</div>

<div class="overlay center" id="catOverlay">
  <div class="dialog">
    <h3>Nuova categoria</h3>
    <div class="field">
      <label for="catName">Nome categoria</label>
      <input id="catName" placeholder="es. Cancelleria">
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" data-close="catOverlay">Annulla</button>
      <button class="btn btn-primary" id="saveCat">Crea</button>
    </div>
  </div>
</div>

<div class="overlay center" id="prodOverlay">
  <div class="dialog">
    <h3>Nuovo prodotto</h3>
    <div class="field">
      <label for="prodName">Nome prodotto</label>
      <input id="prodName" placeholder="es. Sapone di Marsiglia">
    </div>
    <div class="field">
      <label for="prodQty">Quantità</label>
      <input id="prodQty" type="number" min="0" value="1">
    </div>
    <div class="field">
      <label for="prodCat">Categoria</label>
      <select id="prodCat"></select>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" data-close="prodOverlay">Annulla</button>
      <button class="btn btn-primary" id="saveProd">Aggiungi</button>
    </div>
  </div>
</div>

<div class="overlay center" id="importOverlay">
  <div class="dialog">
    <h3>Importa lista della spesa</h3>
    <div class="field">
      <label for="importCat">Categoria per i nuovi articoli</label>
      <select id="importCat"></select>
      <div class="field-hint">Se un prodotto esiste già in un'altra categoria, la quantità verrà semplicemente sommata.</div>
    </div>
    <div class="field">
      <label for="importText">Un prodotto per riga: nome quantità</label>
      <textarea id="importText" placeholder="detersivo piatti 2&#10;shampoo 1&#10;pasta 4"></textarea>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" data-close="importOverlay">Annulla</button>
      <button class="btn btn-primary" id="saveImport">Importa</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_CATEGORIES = ["Cura corpo","Cura casa","Bucato","Dispensa","Generali"];
const COLOR_ROTATION = ["#2E5C8A","#1F6F78","#3E4C8A","#4A7A9C","#5B5E8A","#2C7A9C","#47638A","#3B5D7A"];

let state = { categories: [], products: [] };
let viewMode = 'alpha';
let searchTerm = '';

const $ = (id) => document.getElementById(id);

function colorFor(catName){
  const idx = state.categories.findIndex(c => c.name === catName);
  const c = state.categories[idx];
  return c ? c.color : '#6E6A5E';
}

function initial(catName){
  return (catName || '?').trim().charAt(0).toUpperCase();
}

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

async function loadData(){
  try{
    const res = await window.storage.get('inventory-data', false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.categories = parsed.categories && parsed.categories.length ? parsed.categories : defaultCategories();
      state.products = parsed.products || [];
    } else {
      state.categories = defaultCategories();
      state.products = [];
      await saveData();
    }
  } catch(e){
    state.categories = defaultCategories();
    state.products = [];
  }
  populateCategorySelects();
  render();
}

function defaultCategories(){
  return DEFAULT_CATEGORIES.map((name, i) => ({ name, color: COLOR_ROTATION[i % COLOR_ROTATION.length] }));
}

async function saveData(){
  try{
    await window.storage.set('inventory-data', JSON.stringify(state), false);
  } catch(e){
    toast('Errore nel salvataggio. Riprova.');
  }
}

function populateCategorySelects(){
  const selects = [$('prodCat'), $('importCat')];
  selects.forEach(sel => {
    sel.innerHTML = '';
    state.categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.name;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  });
}

function findProduct(name){
  const n = name.trim().toLowerCase();
  return state.products.find(p => p.name.trim().toLowerCase() === n);
}

function render(){
  const main = $('mainList');
  let items = state.products.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
  $('countBadge').textContent = state.products.length + (state.products.length === 1 ? ' prodotto' : ' prodotti');

  if(items.length === 0){
    main.innerHTML = `<div class="empty-state">
      <div class="big">${state.products.length === 0 ? 'Inventario vuoto' : 'Nessun risultato'}</div>
      <div class="small">${state.products.length === 0 ? 'Tocca + per aggiungere il primo prodotto' : 'Prova un altro termine di ricerca'}</div>
    </div>`;
    return;
  }

  main.innerHTML = '';

  if(viewMode === 'alpha'){
    const sorted = [...items].sort((a,b) => a.name.localeCompare(b.name, 'it'));
    main.appendChild(renderGroup(sorted));
  } else {
    state.categories.forEach(cat => {
      const inCat = items.filter(p => p.category === cat.name).sort((a,b) => a.name.localeCompare(b.name,'it'));
      if(inCat.length === 0) return;
      const header = document.createElement('div');
      header.className = 'cat-header';
      header.innerHTML = `<span class="cat-dot" style="background:${cat.color}"></span><h2>${cat.name}</h2><span class="cat-count">${inCat.length}</span>`;
      main.appendChild(header);
      main.appendChild(renderGroup(inCat));
    });
  }
}

function renderGroup(list){
  const frag = document.createDocumentFragment();
  list.forEach(p => frag.appendChild(renderCard(p)));
  const wrap = document.createElement('div');
  wrap.appendChild(frag);
  return wrap;
}

function renderCard(p){
  const card = document.createElement('div');
  card.className = 'product-card';
  card.innerHTML = `
    <div class="cat-tab" style="background:${colorFor(p.category)}"></div>
    <div class="product-main">
      <div class="product-name">${p.name}${viewMode === 'alpha' ? `<span class="p-cat">${p.category}</span>` : ''}</div>
      <div class="stepper">
        <button class="step-btn" data-act="dec">−</button>
        <span class="qty">${p.qty}</span>
        <button class="step-btn" data-act="inc">+</button>
      </div>
    </div>
    <button class="del-btn" data-act="del">×</button>
  `;
  card.querySelector('[data-act="inc"]').onclick = () => changeQty(p.id, 1);
  card.querySelector('[data-act="dec"]').onclick = () => changeQty(p.id, -1);
  card.querySelector('[data-act="del"]').onclick = () => deleteProduct(p.id);
  return card;
}

function changeQty(id, delta){
  const p = state.products.find(x => x.id === id);
  if(!p) return;
  p.qty = Math.max(0, p.qty + delta);
  render();
  saveData();
}

function deleteProduct(id){
  const p = state.products.find(x => x.id === id);
  state.products = state.products.filter(x => x.id !== id);
  render();
  saveData();
  if(p) toast(`"${p.name}" eliminato`);
}

function openOverlay(id){ $(id).classList.add('show'); }
function closeOverlay(id){ $(id).classList.remove('show'); }

$('btnAlpha').onclick = () => { viewMode = 'alpha'; $('btnAlpha').classList.add('active'); $('btnCat').classList.remove('active'); render(); };
$('btnCat').onclick = () => { viewMode = 'cat'; $('btnCat').classList.add('active'); $('btnAlpha').classList.remove('active'); render(); };
$('searchInput').oninput = (e) => { searchTerm = e.target.value; render(); };

$('fabBtn').onclick = () => openOverlay('menuOverlay');
$('menuOverlay').onclick = (e) => { if(e.target.id === 'menuOverlay') closeOverlay('menuOverlay'); };

$('optCategory').onclick = () => { closeOverlay('menuOverlay'); $('catName').value=''; openOverlay('catOverlay'); };
$('optProduct').onclick = () => { closeOverlay('menuOverlay'); $('prodName').value=''; $('prodQty').value=1; populateCategorySelects(); openOverlay('prodOverlay'); };
$('optImport').onclick = () => { closeOverlay('menuOverlay'); $('importText').value=''; populateCategorySelects(); openOverlay('importOverlay'); };

document.querySelectorAll('[data-close]').forEach(btn => {
  btn.onclick = () => closeOverlay(btn.getAttribute('data-close'));
});
['catOverlay','prodOverlay','importOverlay'].forEach(id => {
  $(id).addEventListener('click', (e) => { if(e.target.id === id) closeOverlay(id); });
});

$('saveCat').onclick = async () => {
  const name = $('catName').value.trim();
  if(!name){ toast('Inserisci un nome'); return; }
  if(state.categories.some(c => c.name.toLowerCase() === name.toLowerCase())){ toast('Categoria già esistente'); return; }
  const color = COLOR_ROTATION[state.categories.length % COLOR_ROTATION.length];
  state.categories.push({ name, color });
  populateCategorySelects();
  closeOverlay('catOverlay');
  await saveData();
  toast(`Categoria "${name}" creata`);
};

$('saveProd').onclick = async () => {
  const name = $('prodName').value.trim();
  const qty = parseInt($('prodQty').value, 10) || 0;
  const category = $('prodCat').value;
  if(!name){ toast('Inserisci un nome prodotto'); return; }
  const existing = findProduct(name);
  if(existing){
    existing.qty += qty;
    toast(`"${name}" aggiornato: ${existing.qty}`);
  } else {
    state.products.push({ id: Date.now() + Math.random().toString(36).slice(2), name, qty, category });
    toast(`"${name}" aggiunto`);
  }
  closeOverlay('prodOverlay');
  render();
  await saveData();
};

$('saveImport').onclick = async () => {
  const raw = $('importText').value;
  const targetCat = $('importCat').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if(lines.length === 0){ toast('Incolla almeno una riga'); return; }
  let added = 0, updated = 0;
  lines.forEach(line => {
    const match = line.match(/^(.*\S)\s+(\d+)$/);
    let name, qty;
    if(match){ name = match[1].trim(); qty = parseInt(match[2], 10); }
    else { name = line; qty = 1; }
    if(!name) return;
    const existing = findProduct(name);
    if(existing){ existing.qty += qty; updated++; }
    else { state.products.push({ id: Date.now() + Math.random().toString(36).slice(2), name, qty, category: targetCat }); added++; }
  });
  closeOverlay('importOverlay');
  render();
  await saveData();
  toast(`${added} nuovi, ${updated} aggiornati`);
};

loadData();
</script>
</body>
</html>
